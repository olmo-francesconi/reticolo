workflows:
  - MonteCarlo:
      name: test
      main_seed: 0

      # Lattice config
      lattice:
        size: [8, 8, 8, 8]

      # Action Config
      action:
        name: RelativisticBoseGas
        parameters:
          lambda: 1.0
          eta: 9.0
          mu: 0.8

      # Update Algorithm Config
      algorithm:
        #Metropolis
        # name: Metropolis
        # parameters:
        #   prop_width: 0.1

        # HMC
        name: HMC
        parameters:
          steps: 5
          stepsize: 0.01

      # Output settings
      output_dir: ./BoseGas_MonteCarlo
      save_config: true
      save_data: true
      console_output: true

      # Run parameters
      runs:
        - name: test_run
          measures: 100
          measure_step: 10
          therm_steps: 0
          field_init: true
          hot_start: false
