workflows:
  - MonteCarlo:
      name: test
      main_seed: 0

      # Lattice config
      lattice:
        size: [6, 12, 12, 12]

      # Action Config
      action:
        name: WeakFieldEuclideanGR
        parameters:
          beta: 5.7
          bc: open

      # Update Algorithm Config
      algorithm:
        name: Metropolis
        parameters:
          prop_width: 0.1

      # Output settings
      output_dir: ./LQGR_MonteCarlo
      save_config: true
      save_data: false
      console_output: true

      # Run parameters
      runs:
        - name: test_run
          measures: 10000
          measure_step: 10
          therm_steps: 0
          field_init:
          hot_start: false
