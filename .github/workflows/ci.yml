name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt every JS-based action into Node 24 even when it still declares Node 20
  # in its action.yml (actions/cache@v4 as of 2026-05). Removes the
  # deprecation annotation noise; revert if any action breaks under Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # ccache tuning — keep cache compact, compress aggressively.
  CCACHE_MAXSIZE: "400M"
  CCACHE_COMPRESS: "true"
  CCACHE_COMPRESSLEVEL: "6"

jobs:
  build:
    name: ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, preset: macos-appleclang }
          - { os: macos-latest, preset: macos-llvm }
          - { os: ubuntu-latest, preset: linux-gcc }
          - { os: ubuntu-latest, preset: linux-clang }

    steps:
      - uses: actions/checkout@v5

      - name: install tools (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build ccache libhdf5-dev libomp-dev

      - name: install tools (macos)
        if: runner.os == 'macOS'
        run: brew install ninja ccache hdf5

      - name: install homebrew llvm (macos-llvm)
        if: matrix.preset == 'macos-llvm'
        run: brew install llvm

      - name: install clang (linux-clang)
        if: matrix.preset == 'linux-clang'
        run: sudo apt-get install -y clang

      - name: ccache dir
        id: ccache_dir
        shell: bash
        run: echo "path=$(ccache -k cache_dir)" >> "$GITHUB_OUTPUT"

      - name: cache compiler outputs (ccache)
        uses: actions/cache@v4
        with:
          path: ${{ steps.ccache_dir.outputs.path }}
          key: ${{ runner.os }}-${{ matrix.preset }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.preset }}-ccache-

      - name: configure
        # RETICOLO_TUNE_NATIVE=OFF: ccache caches objects across GitHub
        # runners with different CPUs; -march=native bakes per-CPU
        # instructions into the cached object and crashes on a different
        # runner with SIGILL. Local dev still defaults to ON via the preset.
        #
        # The macos-appleclang preset bakes RETICOLO_ENABLE_OPENMP=OFF in
        # itself (AppleClang ships without libomp) — no per-matrix flag here.
        run: >
          cmake --preset ${{ matrix.preset }}
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DRETICOLO_TUNE_NATIVE=OFF

      - name: build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: test
        if: hashFiles('tests/CMakeLists.txt') != ''
        run: ctest --preset ${{ matrix.preset }}

      - name: ccache stats
        if: always()
        run: ccache --show-stats --verbose

  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: install clang-format (pinned)
        # Ubuntu's apt clang-format trails the LLVM release by 1-2 years; pin
        # via pip so the CI version matches what developers run locally.
        # Local install: `pipx install clang-format==20.1.7`.
        run: |
          python3 -m venv /tmp/cf-venv
          /tmp/cf-venv/bin/pip install clang-format==20.1.7
          echo "/tmp/cf-venv/bin" >> "$GITHUB_PATH"
      - name: check formatting
        run: |
          shopt -s globstar nullglob
          files=(include/**/*.hpp src/**/*.cpp src/**/*.hpp apps/**/*.cpp tests/**/*.cpp tests/**/*.hpp)
          if [ ${#files[@]} -gt 0 ]; then
            clang-format --dry-run --Werror "${files[@]}"
          else
            echo "no C++ sources yet — skipping"
          fi

  tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: install
        run: sudo apt-get update && sudo apt-get install -y clang-tidy clang ninja-build libhdf5-dev libomp-dev

      - name: configure
        run: cmake --preset linux-clang

      # Sleef generates <sleef.h> at build time, not configure time. Build the
      # sleef target so the umbrella TU's `#include <sleef.h>` resolves when
      # clang-tidy parses it stand-alone.
      - name: build sleef header
        run: cmake --build build/linux-clang --target sleef

      - name: tidy
        run: |
          shopt -s globstar nullglob
          # Tidy scope: src/ only — *constant* size as more apps land.
          #   - src/lint/amalgamation.cpp `#include <reticolo/reticolo.hpp>`,
          #     giving full library-header coverage in ONE TU. HeaderFilterRegex
          #     in .clang-tidy surfaces findings on every public header.
          #   - src/io/writer.cpp is the only library implementation TU.
          # apps/ and tests/ are deliberately not tidied: re-parsing the umbrella
          # per-app costs ~30s each and adds no signal (format + build + runtime
          # tests already gate app and test code).
          files=(src/**/*.cpp)
          if [ ${#files[@]} -gt 0 ]; then
            run-clang-tidy -p build/linux-clang -j "$(nproc)" -quiet "${files[@]}"
          else
            echo "no production TUs yet — skipping"
          fi
