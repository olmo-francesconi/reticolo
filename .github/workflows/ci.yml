name: ci

on:
  push:
    branches: [rewrite/v3, main]
  pull_request:
    branches: [rewrite/v3, main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt every JS-based action into Node 24 even when it still declares Node 20
  # in its action.yml (actions/cache@v4 as of 2026-05). Removes the
  # deprecation annotation noise; revert if any action breaks under Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # ccache tuning — keep cache compact, compress aggressively.
  CCACHE_MAXSIZE: "400M"
  CCACHE_COMPRESS: "true"
  CCACHE_COMPRESSLEVEL: "6"

jobs:
  build:
    name: ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, preset: macos-appleclang }
          - { os: macos-latest, preset: macos-llvm }
          - { os: ubuntu-latest, preset: linux-gcc }
          - { os: ubuntu-latest, preset: linux-clang }

    steps:
      - uses: actions/checkout@v5

      - name: install tools (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build ccache

      - name: install tools (macos)
        if: runner.os == 'macOS'
        run: brew install ninja ccache

      - name: install homebrew llvm (macos-llvm)
        if: matrix.preset == 'macos-llvm'
        run: brew install llvm

      - name: install clang (linux-clang)
        if: matrix.preset == 'linux-clang'
        run: sudo apt-get install -y clang

      - name: ccache dir
        id: ccache_dir
        shell: bash
        run: echo "path=$(ccache -k cache_dir)" >> "$GITHUB_OUTPUT"

      - name: cache compiler outputs (ccache)
        uses: actions/cache@v4
        with:
          path: ${{ steps.ccache_dir.outputs.path }}
          key: ${{ runner.os }}-${{ matrix.preset }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.preset }}-ccache-

      - name: configure
        run: >
          cmake --preset ${{ matrix.preset }}
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache

      - name: build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: test
        if: hashFiles('tests/CMakeLists.txt') != ''
        run: ctest --preset ${{ matrix.preset }}

      - name: ccache stats
        if: always()
        run: ccache --show-stats --verbose

  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format
      - name: check formatting
        run: |
          shopt -s globstar nullglob
          files=(include/**/*.hpp src/**/*.cpp src/**/*.hpp apps/**/*.cpp tests/**/*.cpp tests/**/*.hpp)
          if [ ${#files[@]} -gt 0 ]; then
            clang-format --dry-run --Werror "${files[@]}"
          else
            echo "no C++ sources yet — skipping"
          fi

  tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: install
        run: sudo apt-get update && sudo apt-get install -y clang-tidy clang ninja-build

      - name: configure
        run: cmake --preset linux-clang

      - name: tidy
        run: |
          shopt -s globstar nullglob
          # clang-tidy needs TUs (.cpp) to resolve include paths; library
          # headers are linted via the HeaderFilterRegex configured in
          # .clang-tidy as the .cpp TUs include them.
          # run-clang-tidy parallelises across cores and -quiet suppresses
          # the per-warning chatter that comes from analysing Catch2 templates.
          files=(src/**/*.cpp apps/**/*.cpp tests/**/*.cpp)
          if [ ${#files[@]} -gt 0 ]; then
            run-clang-tidy -p build/linux-clang -j "$(nproc)" -quiet "${files[@]}"
          else
            echo "no C++ TUs yet — skipping"
          fi
