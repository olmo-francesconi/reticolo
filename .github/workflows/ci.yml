name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Opt every JS-based action into Node 24 even when it still declares Node 20
  # in its action.yml (actions/cache@v4 as of 2026-05). Removes the
  # deprecation annotation noise; revert if any action breaks under Node 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # ccache tuning — keep cache compact, compress aggressively.
  CCACHE_MAXSIZE: "400M"
  CCACHE_COMPRESS: "true"
  CCACHE_COMPRESSLEVEL: "6"

jobs:
  build:
    name: ${{ matrix.preset }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # The GPU preset `linux-nvcc` is intentionally absent: GitHub-hosted
        # runners have no NVIDIA GPU and no CUDA toolkit, so it can neither build
        # (nvcc) nor run the device tests (ctest needs a real GPU). The CUDA gate
        # runs on a cloud GPU host and must be green before merging CUDA changes:
        #   uv run tools/modal/app.py build      # configure + build + ctest, linux-nvcc preset
        # (Kaggle equivalent: tools/kaggle/push.sh)
        include:
          - { os: macos-latest, preset: macos-appleclang }
          - { os: macos-latest, preset: macos-llvm }
          - { os: ubuntu-latest, preset: linux-gcc }
          - { os: ubuntu-latest, preset: linux-clang }

    steps:
      - uses: actions/checkout@v5

      - name: install tools (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ninja-build ccache libhdf5-dev libomp-dev

      - name: install tools (macos)
        if: runner.os == 'macOS'
        run: brew install ninja ccache hdf5

      - name: install homebrew llvm (macos-llvm)
        if: matrix.preset == 'macos-llvm'
        run: brew install llvm

      - name: install clang (linux-clang)
        if: matrix.preset == 'linux-clang'
        run: sudo apt-get install -y clang

      - name: ccache dir
        id: ccache_dir
        shell: bash
        run: echo "path=$(ccache -k cache_dir)" >> "$GITHUB_OUTPUT"

      - name: cache compiler outputs (ccache)
        uses: actions/cache@v4
        with:
          path: ${{ steps.ccache_dir.outputs.path }}
          key: ${{ runner.os }}-${{ matrix.preset }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.preset }}-ccache-

      - name: configure
        # RETICOLO_TUNE_NATIVE=OFF: ccache caches objects across GitHub
        # runners with different CPUs; -march=native bakes per-CPU
        # instructions into the cached object and crashes on a different
        # runner with SIGILL. Local dev still defaults to ON via the preset.
        #
        # The macos-appleclang preset bakes RETICOLO_ENABLE_OPENMP=OFF in
        # itself (AppleClang ships without libomp) — no per-matrix flag here.
        #
        # BENCHMARKS/EXAMPLES OFF: the dev presets build both, but CI doesn't
        # need them. The bench_* suite is never run by ctest, and the examples
        # are covered by the dedicated example-standalone job below — building
        # them here is ~25 umbrella-heavy TUs of wasted compile per matrix entry.
        run: >
          cmake --preset ${{ matrix.preset }}
          -DCMAKE_C_COMPILER_LAUNCHER=ccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache
          -DRETICOLO_TUNE_NATIVE=OFF
          -DRETICOLO_BUILD_BENCHMARKS=OFF
          -DRETICOLO_BUILD_EXAMPLES=OFF

      - name: build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: test
        if: hashFiles('tests/CMakeLists.txt') != ''
        run: ctest --preset ${{ matrix.preset }}

      - name: ccache stats
        if: always()
        run: ccache --show-stats --verbose

  example-standalone:
    name: example standalone build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: install tools
        run: brew install ninja hdf5
      - name: build example as a detached consumer
        # Configure + build examples/01 through its OWN CMakeLists (not the root
        # preset). With the repo checked out, the example's find-or-fetch block
        # resolves reticolo via the sibling-checkout branch (add_subdirectory
        # ../..), building it core-only. This exercises the consumer linking
        # path and the OpenMP auto-degrade on AppleClang that the preset build
        # (which forces OpenMP off) never hits. The git-fetch fallback isn't
        # tested here: on a PR it would pull the published main, not this commit.
        run: |
          cd examples/01_phi4_tuning
          cmake -S . -B build/ci -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build/ci
      - name: smoke-run
        run: examples/01_phi4_tuning/build/ci/phi4_hmc --size=8 --n_therm=5 --n_prod=5 --out="$RUNNER_TEMP/ci.h5"

  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: install clang-format (pinned)
        # Ubuntu's apt clang-format trails the LLVM release by 1-2 years; pin
        # via pip so the CI version matches what developers run locally.
        # Local install: `pipx install clang-format==20.1.7`.
        run: |
          python3 -m venv /tmp/cf-venv
          /tmp/cf-venv/bin/pip install clang-format==20.1.7
          echo "/tmp/cf-venv/bin" >> "$GITHUB_PATH"
      - name: check formatting
        run: |
          shopt -s globstar nullglob
          files=(include/**/*.hpp src/**/*.cpp src/**/*.hpp apps/**/*.cpp tests/**/*.cpp tests/**/*.hpp)
          if [ ${#files[@]} -gt 0 ]; then
            clang-format --dry-run --Werror "${files[@]}"
          else
            echo "no C++ sources yet — skipping"
          fi

  tidy:
    name: clang-tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Pinned to clang-tidy 18 (compiler + analyzer): the enabled-check set and
      # its diagnostics are version-sensitive, so an Ubuntu default bump to
      # clang-19/20 would silently change what the gate enforces. The compile DB
      # is built with the same clang so clang-tidy parses it without frontend
      # errors. Reproduce locally with the same clang-18 + clang-tidy-18.
      - name: install
        run: sudo apt-get update && sudo apt-get install -y clang-18 clang-tools-18 clang-tidy-18 ninja-build libhdf5-dev libomp-dev

      - name: configure
        run: cmake --preset linux-clang -DCMAKE_C_COMPILER=clang-18 -DCMAKE_CXX_COMPILER=clang++-18

      # Sleef generates <sleef.h> at build time, not configure time. Build the
      # sleef target so the umbrella TU's `#include <sleef.h>` resolves when
      # clang-tidy parses it stand-alone.
      - name: build sleef header
        run: cmake --build build/linux-clang --target sleef

      - name: tidy
        run: |
          shopt -s globstar nullglob
          # Tidy scope: src/ only — *constant* size as more apps land.
          #   - src/lint/amalgamation.cpp `#include <reticolo/reticolo.hpp>`,
          #     giving full library-header coverage in ONE TU. HeaderFilterRegex
          #     in .clang-tidy surfaces findings on every public header.
          #   - src/io/writer.cpp is the only library implementation TU.
          # apps/ and tests/ are deliberately not tidied: re-parsing the umbrella
          # per-app costs ~30s each and adds no signal (format + build + runtime
          # tests already gate app and test code).
          files=(src/**/*.cpp)
          if [ ${#files[@]} -gt 0 ]; then
            # WarningsAsErrors in .clang-tidy makes any finding fail the job.
            run-clang-tidy-18 -p build/linux-clang -j "$(nproc)" -quiet "${files[@]}"
          else
            echo "no production TUs yet — skipping"
          fi
